  <style>
    /* ── 首頁：全螢幕 Hero ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 5% 6vh;
      position: relative;
      overflow: hidden;
    }

    /* 背景：純黑加細微雜訊感 */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 80% 30%, rgba(255,255,255,0.02) 0%, transparent 70%),
        var(--bg);
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    /* 大標題 */
    .hero-name {
      font-size: clamp(2.8rem, 8vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--accent);
      margin-bottom: 1.2rem;
      /* 分行動畫 */
      overflow: hidden;
    }

    .hero-name span {
      display: block;
      opacity: 0;
      transform: translateY(40px);
      animation: slideUp 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .hero-name span:nth-child(1) { animation-delay: 0.1s; }
    .hero-name span:nth-child(2) { animation-delay: 0.22s; }

    /* 副標題 */
    .hero-sub {
      font-size: clamp(0.7rem, 1.5vw, 0.85rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.5s forwards;
    }

    /* 社群連結（橫排）*/
    .hero-social {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.7s forwards;
    }

    .hero-social a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }
    .hero-social a:hover { color: var(--accent); }
    .hero-social a svg {
      width: 13px; height: 13px;
      opacity: 0.5;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .hero-social a:hover svg { opacity: 1; }

    /* 右下角捲動提示 */
    .scroll-hint {
      position: absolute;
      bottom: 3vh;
      right: 5%;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #333;
      writing-mode: vertical-rl;
      opacity: 0;
      animation: fadeIn 1s ease 1.2s forwards;
    }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ── 手機調整 ── */
    @media (max-width: 800px) {
      .hero { padding-bottom: 10vh; }
      .hero-social { gap: 1.5rem; }
      .scroll-hint { display: none; }
    }
  </style>
</head>
